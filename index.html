<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEED OS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e14;
    --surface: #12161e;
    --border: #1e2530;
    --text: #c8ccd4;
    --text-dim: #6b7280;
    --accent: #22c55e;
    --accent-dim: #166534;
    --user-bg: #1a2332;
    --seed-bg: #111518;
    --yellow: #eab308;
    --blue: #3b82f6;
    --red: #ef4444;
    --purple: #a855f7;
  }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .seed-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.3); }
    50% { box-shadow: 0 0 12px 4px rgba(34,197,94,0.15); }
  }
  .header h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .header .ver {
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Model Selector */
  .model-selector {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
  }
  .model-btn {
    padding: 5px 12px;
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    background: transparent;
    color: var(--text-dim);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .model-btn:hover {
    color: var(--text);
    background: rgba(255,255,255,0.05);
  }
  .model-btn.active {
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 600;
  }
  .model-btn.active.gateway {
    background: rgba(59,130,246,0.2);
    color: var(--blue);
  }
  .model-btn.active.api {
    background: rgba(234,179,8,0.2);
    color: var(--yellow);
  }
  .model-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }
  .model-dot.online { background: var(--accent); }
  .model-dot.cloud  { background: var(--yellow); }

  .privacy-badge {
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 3px;
    margin-left: 4px;
  }
  .privacy-badge.local  { background: rgba(34,197,94,0.15); color: var(--accent); }
  .privacy-badge.cloud  { background: rgba(234,179,8,0.15);  color: var(--yellow); }

  /* Status Bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }
  .status-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }

  /* Version badge — clickable, lives in status bar */
  .version-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    background: rgba(168,85,247,0.1);
    border: 1px solid rgba(168,85,247,0.25);
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .version-badge:hover {
    background: rgba(168,85,247,0.2);
  }
  .version-badge .ver-num {
    color: var(--purple);
    font-weight: 600;
    font-size: 11px;
  }
  .version-badge .ver-health {
    font-size: 10px;
    color: var(--text-dim);
  }
  /* health dot colours */
  .h-robust    { color: var(--accent); }
  .h-improved  { color: var(--blue); }
  .h-untested  { color: var(--yellow); }
  .h-weak      { color: #f97316; }
  .h-broken    { color: var(--red); }

  /* Chat Area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .msg.seed {
    align-self: flex-start;
    background: var(--seed-bg);
    border-left: 2px solid var(--accent);
    color: var(--text);
  }
  .msg.seed.gateway-msg { border-left-color: var(--blue); }
  .msg.seed.api-msg     { border-left-color: var(--yellow); }
  .msg .msg-source {
    font-size: 9px;
    color: var(--text-dim);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .msg.system {
    align-self: center;
    color: var(--text-dim);
    font-size: 11px;
    font-style: italic;
  }
  .thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--accent-dim);
    font-size: 12px;
    padding: 8px 16px;
  }
  .thinking .dots span {
    animation: blink 1.4s infinite;
    font-size: 18px;
  }
  .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  /* Input */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
  }
  .input-area input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area input:focus  { border-color: var(--accent); }
  .input-area input::placeholder { color: var(--text-dim); }
  .input-area button {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .input-area button:hover    { opacity: 0.85; }
  .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

  .chat::-webkit-scrollbar       { width: 6px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="seed-icon">🌱</div>
    <div>
      <h1>SEED OS</h1>
      <span class="ver">Multi-Brain</span>
    </div>
  </div>

  <div class="model-selector" id="model-selector">
    <button class="model-btn active" data-backend="local" onclick="switchModel('local')">
      <span class="model-dot online"></span>
      Local
      <span class="privacy-badge local">🔒</span>
    </button>
    <button class="model-btn gateway" data-backend="gateway" onclick="switchModel('gateway')">
      <span class="model-dot" id="gateway-dot"></span>
      Gateway
      <span class="privacy-badge local">🔒</span>
    </button>
    <button class="model-btn api" data-backend="api" onclick="switchModel('api')">
      <span class="model-dot" id="api-dot"></span>
      API
      <span class="privacy-badge cloud">☁️</span>
    </button>
  </div>

  <div class="status-bar">
    <span><span class="status-dot"></span>Online</span>
    <span id="cpu-stat">CPU: --</span>
    <span id="ram-stat">RAM: --</span>
    <span id="disk-stat">Disk: --</span>
    <!-- Version badge — always visible, click to query version in chat -->
    <span class="version-badge" onclick="askVersion()" title="Click for version details">
      <span class="ver-num" id="ver-num">v--</span>
      <span class="ver-health" id="ver-health">loading...</span>
    </span>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input type="text" id="input" placeholder="Talk to SEED..." autofocus>
  <button id="send" onclick="sendMessage()">SEND</button>
</div>

<script>
const chat    = document.getElementById("chat");
const input   = document.getElementById("input");
const sendBtn = document.getElementById("send");

let activeBackend = "local";
const caps = {{ capabilities | tojson }};

// Boot message
addMsg("system", `SEED booted on ${caps.hostname} | ${caps.ram_total_gb}GB RAM | ${caps.disk_free_gb}GB disk | ${caps.installed_tools.length} tools detected`);
addMsg("seed", `I'm SEED. I'm running on ${caps.hostname} with ${caps.cpu_cores} CPU cores and ${caps.ram_total_gb}GB RAM.\n\nI have three brains available:\n  🟢 Local   — Gemma 1B on this machine (private, always on)\n  🔵 Gateway — Qwen3.5 27B on dual 3090s over LAN (private, powerful)\n  🟡 API     — Cloud model (most capable, data leaves network)\n\nSelect a brain from the top bar, or just start talking.\n\nWhat would you like me to become?`);

function addMsg(type, text, backend) {
  const div = document.createElement("div");
  let classes = `msg ${type}`;
  if (type === "seed" && backend === "gateway") classes += " gateway-msg";
  if (type === "seed" && backend === "api")     classes += " api-msg";
  div.className = classes;

  if (type === "seed" && backend && backend !== "local") {
    const source = document.createElement("div");
    source.className = "msg-source";
    const labels = { gateway: "🔵 gateway", api: "🟡 api" };
    source.textContent = labels[backend] || backend;
    div.appendChild(source);
  }

  const content = document.createElement("span");
  content.textContent = text;
  div.appendChild(content);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showThinking() {
  const div = document.createElement("div");
  div.className = "thinking";
  div.id = "thinking";
  const labels = { local: "SEED is thinking locally", gateway: "SEED is consulting the gateway", api: "SEED is querying the cloud" };
  div.innerHTML = `${labels[activeBackend] || "SEED is thinking"}<span class="dots"><span>.</span><span>.</span><span>.</span></span>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideThinking() {
  const el = document.getElementById("thinking");
  if (el) el.remove();
}

function switchModel(backend) {
  activeBackend = backend;
  document.querySelectorAll(".model-btn").forEach(btn => {
    btn.classList.remove("active");
    if (btn.dataset.backend === backend) btn.classList.add("active");
  });
  fetch("/models/set", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ backend: backend })
  });
  addMsg("system", `Switched to ${backend} backend`);
}

async function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;

  addMsg("user", msg);
  input.value = "";
  sendBtn.disabled = true;
  showThinking();

  try {
    const resp = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, backend: activeBackend })
    });
    const data = await resp.json();
    hideThinking();
    addMsg("seed", data.reply, data.backend || activeBackend);
  } catch (e) {
    hideThinking();
    addMsg("seed", `[Connection error: ${e.message}]`);
  }
  sendBtn.disabled = false;
  input.focus();
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});

// Click the version badge to ask SEED for version details in chat
function askVersion() {
  input.value = "version info";
  sendMessage();
}

// Render version badge from /status data
function renderVersionBadge(s) {
  const verNum    = document.getElementById("ver-num");
  const verHealth = document.getElementById("ver-health");
  if (!s.version) return;

  verNum.textContent = `v${s.version}`;

  const raw = s.version_summary || "";
  // Parse "v0.1.5 · 3 robust · 1 weak" into coloured spans
  const parts = raw.split(" · ").slice(1); // drop the version prefix, already shown
  if (!parts.length) {
    verHealth.textContent = "no log";
    return;
  }
  verHealth.innerHTML = parts.map(p => {
    if (p.includes("robust"))   return `<span class="h-robust">${p}</span>`;
    if (p.includes("improved")) return `<span class="h-improved">${p}</span>`;
    if (p.includes("untested")) return `<span class="h-untested">${p}</span>`;
    if (p.includes("weak"))     return `<span class="h-weak">${p}</span>`;
    if (p.includes("BROKEN"))   return `<span class="h-broken">${p}</span>`;
    return `<span>${p}</span>`;
  }).join(' <span style="color:var(--border)">·</span> ');
}

// Live status bar
async function updateStatus() {
  try {
    const resp = await fetch("/status");
    const s = await resp.json();
    document.getElementById("cpu-stat").textContent  = `CPU: ${s.cpu_percent}%`;
    document.getElementById("ram-stat").textContent  = `RAM: ${s.ram_used_gb}/${(s.ram_used_gb + s.ram_available_gb).toFixed(1)}GB`;
    document.getElementById("disk-stat").textContent = `Disk: ${s.disk_free_gb}GB free`;
    renderVersionBadge(s);
  } catch(e) {}
}

async function updateModelStatus() {
  try {
    const resp = await fetch("/models");
    const m = await resp.json();
    const gwDot  = document.getElementById("gateway-dot");
    const apiDot = document.getElementById("api-dot");
    if (gwDot)  gwDot.className  = `model-dot ${m.gateway?.online ? "online" : ""}`;
    if (apiDot) apiDot.className = `model-dot ${m.api?.online ? "cloud" : ""}`;
  } catch(e) {}
}

updateStatus();
updateModelStatus();
setInterval(updateStatus, 10000);
setInterval(updateModelStatus, 30000);
</script>
</body>
</html>
